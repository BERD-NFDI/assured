anews = '''

Registration is now OPEN for our essential workshop at the International Data Curation Conference (IDCC) 2026!
The ASSURED Project is developing an accreditation scheme for handling sensitive research data. This workshop is your opportunity to gain critical expertise.

What You Will Learn:
• Safe Outputs: Explore the issues emerging from sensitive data results and learn the principles for producing non-disclosive, safe outputs.
• Key Techniques: Focus on methods like Statistical Disclosure Control (SDC) to minimise harm and protect privacy.
• Interactive Training: This is a highly interactive-focused session, encouraging rich discussion among researchers and data professionals.

Who Should Attend?
This training is important for:
• Researchers working with sensitive data.
• Data Curators and professionals involved in data access.
• Anyone responsible for ethical data release.

Elevate your professional standards. Secure your spot and become more confident in working with sensitive data.

